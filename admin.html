<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay IMS - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .sidebar {
            width: 260px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            height: calc(100vh - 65px);
            padding: 2rem;
            position: fixed;
            transition: transform 0.3s ease;
            z-index: 100;
        }
        .main-content {
            margin-left: 260px;
            padding: 1.5rem;
            transition: margin 0.3s ease;
        }
        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }
        .nav-link:hover, .nav-link.active {
            background: var(--primary);
            color: white;
        }
        .stat-card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
        }
        
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .sidebar { 
                transform: translateX(-100%); 
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content { 
                margin-left: 0; 
                padding: 1rem;
            }
            .menu-toggle {
                display: block;
            }
        }
</style>
</head>
<body class="animate-fade-in">

    <nav class="navbar">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <button class="menu-toggle" onclick="toggleMenu()">☰</button>
            <div class="nav-brand">🏢 Barangay Admin</div>
        </div>
        <button class="btn btn-outline" style="width: auto;" onclick="logout()">Logout</button>
    </nav>

    <div class="sidebar" id="sidebar">
        <a class="nav-link active" onclick="showSection('overview')">Dashboard Overview</a>
        <a class="nav-link" onclick="showSection('announcements')">Announcements</a>
        <a class="nav-link" onclick="showSection('requests')">Certificate Requests</a>
        <a class="nav-link" onclick="showSection('residents')">Resident List</a>
        <a class="nav-link" onclick="showSection('ids')">ID Issuance</a>
    </div>

    <div class="main-content">
        <!-- Overview Section -->
        <section id="overview" class="section">
            <h2 style="margin-bottom: 1.5rem;">Dashboard Overview</h2>
            <div class="dashboard-grid">
                <div class="stat-card">
                    <span style="font-size: 0.875rem; color: var(--text-muted);">Total Residents</span>
                    <h3 id="total-residents" style="font-size: 2rem; margin-top: 0.5rem;">0</h3>
                </div>
                <div class="stat-card" style="border-left-color: var(--warning);">
                    <span style="font-size: 0.875rem; color: var(--text-muted);">Pending Requests</span>
                    <h3 id="pending-requests" style="font-size: 2rem; margin-top: 0.5rem;">0</h3>
                </div>
                <div class="stat-card" style="border-left-color: var(--success);">
                    <span style="font-size: 0.875rem; color: var(--text-muted);">Active Announcements</span>
                    <h3 id="total-ann" style="font-size: 2rem; margin-top: 0.5rem;">0</h3>
                </div>
            </div>
        </section>

        <!-- Announcements Section -->
        <section id="announcements" class="section" style="display: none;">
            <h2 style="margin-bottom: 1.5rem;">Manage Announcements</h2>
            <div class="card" style="margin-bottom: 2rem;">
                <div class="input-group">
                    <label>New Announcement Content</label>
                    <textarea id="ann-content" placeholder="Type your announcement here..." rows="3"></textarea>
                </div>
                <button class="btn btn-primary" id="postBtn" onclick="postAnn()" style="width: auto;">Post Announcement</button>
            </div>
            <div id="ann-list"></div>
        </section>

        <!-- Requests Section -->
        <section id="requests" class="section" style="display: none;">
            <h2 style="margin-bottom: 1.5rem;">Certificate Requests</h2>
            <div id="req-list" class="dashboard-grid"></div>
        </section>

        <!-- Residents Section -->
        <section id="residents" class="section" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2>Residents</h2>
                <select id="purok-filter" onchange="filterResidents(this.value)" style="width: auto;">
                    <option value="all">All Puroks</option>
                    <option value="Purok 1">Purok 1</option>
                    <option value="Purok 2">Purok 2</option>
                    <option value="Purok 3">Purok 3</option>
                    <option value="Purok 4">Purok 4</option>
                    <option value="Purok 5">Purok 5</option>
                    <option value="Purok 6">Purok 6</option>
                    <option value="Purok 7">Purok 7</option>
                </select>
            </div>
            <div id="res-list" class="dashboard-grid"></div>
        </section>

        <!-- ID Issuance Section -->
        <section id="ids" class="section" style="display: none;">
            <h2 style="margin-bottom: 1.5rem;">ID Issuance</h2>
            <div class="card" style="margin-bottom: 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="input-group"><label>Full Name</label><input id="id-name"></div>
                <div class="input-group"><label>Address</label><input id="id-address"></div>
                <div class="input-group"><label>Birthdate</label><input id="id-bdate" type="date"></div>
                <div class="input-group"><label>Contact</label><input id="id-contact"></div>
                <button class="btn btn-primary" onclick="issueID()" style="grid-column: span 2;">Generate ID Record</button>
            </div>
            <div id="id-list" class="dashboard-grid"></div>
        </section>
    </div>

    <script src="api.js"></script>
    <script>
        if (localStorage.getItem("role") !== "admin") location.href = "index.html";

        let currentSection = 'overview';

        function showSection(id) {
            currentSection = id;
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            event.currentTarget.classList.add('active');
            
            // Close menu on mobile after selection
            if (window.innerWidth <= 768) {
                toggleMenu();
            }
            
            refreshData();
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        async function refreshData() {
            if (currentSection === 'overview') updateStats();
            if (currentSection === 'residents') filterResidents(document.getElementById('purok-filter').value);
            if (currentSection === 'announcements') loadAnnouncements();
            if (currentSection === 'requests') loadRequests();
            if (currentSection === 'ids') loadIDs();
        }

        async function updateStats() {
            const users = await apiGet("users");
            const reqs = await apiGet("req");
            const anns = await apiGet("ann");
            
            document.getElementById('total-residents').innerText = users.length;
            document.getElementById('pending-requests').innerText = reqs.filter(r => r.status === 'Pending').length;
            document.getElementById('total-ann').innerText = anns.length;
        }

        async function postAnn() {
            const content = document.getElementById('ann-content').value.trim();
            if (!content) return;
            
            const postBtn = document.getElementById('postBtn');
            postBtn.disabled = true;

            const anns = await apiGet("ann");
            anns.unshift({ text: content, date: new Date().toLocaleString() });
            await apiPost("ann", anns);
            
            document.getElementById('ann-content').value = "";
            postBtn.disabled = false;
            loadAnnouncements();
        }

        async function loadAnnouncements() {
            const anns = await apiGet("ann");
            document.getElementById('ann-list').innerHTML = anns.map((a, i) => `
                <div class="card" style="margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: start;">
                    <div><p>${a.text}</p><small style="color: var(--text-muted)">${a.date}</small></div>
                    <button class="btn btn-danger" style="width: auto; padding: 0.5rem;" onclick="deleteAnn(${i})">Delete</button>
                </div>
            `).join("");
        }

        async function deleteAnn(i) {
            const anns = await apiGet("ann");
            anns.splice(i, 1);
            await apiPost("ann", anns);
            loadAnnouncements();
        }

        async function filterResidents(purok) {
            const users = await apiGet("users");
            const filtered = purok === 'all' ? users : users.filter(u => u.purok === purok);
            
            document.getElementById('res-list').innerHTML = filtered.map((u, i) => `
                <div class="card" style="position: relative;">
                    <button onclick="deleteResident(${i})" style="position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.25rem;">✖</button>
                    <h4 style="margin-bottom: 0.5rem;">${u.name}</h4>
                    <p style="font-size: 0.875rem; color: var(--text-muted);">@${u.username}</p>
                    <span class="badge" style="background: var(--bg-main);">${u.purok}</span>
                </div>
            `).join("");
        }

        async function deleteResident(idx) {
            if (!confirm("Delete this resident account?")) return;
            const users = await apiGet("users");
            users.splice(idx, 1);
            await apiPost("users", users);
            filterResidents(document.getElementById('purok-filter').value);
            updateStats();
        }

        async function loadRequests() {
            const reqs = await apiGet("req");
            document.getElementById('req-list').innerHTML = reqs.map((r, i) => `
                <div class="card" style="position: relative;">
                    ${r.status !== 'Pending' ? `<button onclick="deleteReq(${i})" style="position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.25rem;">✖</button>` : ''}
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                        <span class="badge badge-${r.status.toLowerCase()}">${r.status}</span>
                        <small style="color: var(--text-muted)">${r.date}</small>
                    </div>
                    <h4 style="margin-bottom: 0.25rem;">${r.name}</h4>
                    <p style="margin-bottom: 1rem;">Requesting: <strong>${r.type}</strong></p>
                    ${r.status === 'Pending' ? `
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="btn btn-primary" onclick="updateReq(${i}, 'Approved')">Approve</button>
                            <button class="btn btn-danger" onclick="updateReq(${i}, 'Rejected')">Reject</button>
                        </div>
                    ` : ''}
                </div>
            `).join("");
        }

        async function updateReq(i, status) {
            const reqs = await apiGet("req");
            reqs[i].status = status;
            await apiPost("req", reqs);
            loadRequests();
        }

        async function deleteReq(i) {
            if (!confirm("Remove this request?")) return;
            const reqs = await apiGet("req");
            reqs.splice(i, 1);
            await apiPost("req", reqs);
            loadRequests();
            updateStats();
        }

        async function issueID() {
            const ids = await apiGet("ids");
            ids.unshift({
                name: document.getElementById('id-name').value,
                address: document.getElementById('id-address').value,
                bdate: document.getElementById('id-bdate').value,
                contact: document.getElementById('id-contact').value
            });
            await apiPost("ids", ids);
            loadIDs();
            ['id-name', 'id-address', 'id-bdate', 'id-contact'].forEach(id => document.getElementById(id).value = "");
        }

        async function loadIDs() {
            const ids = await apiGet("ids");
            document.getElementById('id-list').innerHTML = ids.map((id, i) => `
                <div class="card">
                    <div style="display: flex; justify-content: space-between;">
                        <h4>${id.name}</h4>
                        <button onclick="deleteID(${i})" style="background: none; border: none; color: var(--danger); cursor: pointer;">✖</button>
                    </div>
                    <p style="font-size: 0.875rem; color: var(--text-muted); margin-top: 0.5rem;">📍 ${id.address}<br>🎂 ${id.bdate}<br>📞 ${id.contact}</p>
                </div>
            `).join("");
        }

        async function deleteID(i) {
            const ids = await apiGet("ids");
            ids.splice(i, 1);
            await apiPost("ids", ids);
            loadIDs();
        }

        function logout() { localStorage.removeItem("role"); location.href = "index.html"; }
        updateStats();
    </script>
</body>
</html>
